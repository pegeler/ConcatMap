# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
exclude: '^docs/'
fail_fast: true
repos:
- repo: https://github.com/pylint-dev/pylint
  rev: v4.0.6
  hooks:
    - id: pylint
- repo: https://github.com/pycqa/isort
  rev: 5.12.0
  hooks:
    - id: isort
      name: isort (python)
      args: [--sl]
- repo: local
  hooks:
    # Advisory type check. switch to ty once it reaches 1.0.
    - id: pyrefly
      name: pyrefly (advisory)
      entry: bash -c 'pyrefly check src/concatmap || true'
      language: system
      types: [python]
      pass_filenames: false
      verbose: true
    - id: pytest
      types: [python]
      name: pytest
      entry: python -m pytest -vv
      language: system
      pass_filenames: false
